<a
      [routerLink]="path"
      routerLinkActive="bg-[#8E4E2A] text-white shadow-md"
      class="flex items-center hover:bg-white/10 rounded-lg p-3 transition-all duration-150 text-[#E6DCD3]"
>
      <i class="{{ icon }} text-xl mr-3 text-[#C2A378]"></i>
      <div class="flex flex-col flex-grow">
        <span class="font-semibold">{{ title }}</span>
        <span class="text-[#A68D7B] text-xs">{{ description }}</span>
      </div>
</a>
