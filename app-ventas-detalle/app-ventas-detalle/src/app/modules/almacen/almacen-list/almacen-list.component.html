<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-4xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Almacenes con Productos
  </h2>

  <!-- Botón para crear un nuevo almacén -->
  <div class="flex justify-end mb-4">
    <button (click)="crearAlmacen()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
      ➕ Crear Almacén
    </button>
  </div>

  <div *ngIf="mensaje" class="mt-3 mb-2 p-4 bg-[#FAF6EE] border-l-4 border-[#8E4E2A] text-[#5C3E21] rounded-lg flex items-center justify-between">
    <span>{{ mensaje }}</span>
    <button (click)="mensaje = ''" class="text-[#8E4E2A] hover:text-[#5C3E21] font-bold">
      &times;
    </button>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-5 py-2 text-left ">ID</th>
          <th class="px-5 py-2 text-left">Almacén</th>
          <th class="px-5 py-2 text-left">Dirección</th>
          <th class="px-5 py-2 text-left ">Productos</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let almacen of almacenes"
          class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4">{{ almacen.id }}</td>
          <td class="px-6 py-4 font-semibold text-[#8E4E2A] font-semibold">{{ almacen.nombre }}</td>
          <td class="px-6 py-4">{{ almacen.locacion }}</td>
          <td class="px-6 py-4">
            <div class="flex flex-wrap gap-2 justify-start">
              <ng-container *ngIf="almacen.productos && almacen.productos.length > 0; else noProductosAlmacen">
                <div *ngFor="let producto of almacen.productos" class="flex items-center gap-2 bg-amber-50 text-[#8E4E2A] border border-amber-200/50 rounded-lg shadow-sm px-3 py-1 text-sm">
                  <span>
                    {{ producto.nombreProducto }} - Stock {{ producto.stock }} - {{ producto.precio }} Bs
                  </span>
                  <button
                    (click)="eliminarProducto(producto.productoId!,almacen.id!)"

                    class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded-md transition duration-300">
                    X
                  </button>
                </div>
              </ng-container>
              <ng-template #noProductosAlmacen>
                <span class="text-amber-800/80 italic">🚫 No tiene productos este almacén.</span>
              </ng-template>
            </div>

          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
