<div class="mt-8 p-8 bg-white rounded-lg shadow-xl max-w-4xl mx-auto">
  <h2 class="text-4xl font-extrabold text-[#3E261A] mb-8 text-left">Agregar Cliente</h2>

  <!-- Mostrar mensaje de error si hay uno -->
  <div *ngIf="errorMessage" class="error-message text-red-500 text-center mb-6">
    <p>{{ errorMessage }}</p>
  </div>

  <!-- Formulario para agregar un cliente -->
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
      <div class="form-group">
        <label for="nombre" class="block text-sm font-semibold text-[#3E261A] mb-1">Nombre</label>
        <input id="nombre" formControlName="nombre" type="text"
               class="w-full p-3 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition placeholder-amber-800/40 shadow-sm" />
      </div>

      <div class="form-group">
        <label for="apellidos" class="block text-sm font-semibold text-[#3E261A] mb-1">Apellido Paterno</label>
        <input id="apellidos" formControlName="apellidos" type="text"
               class="w-full p-3 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition placeholder-amber-800/40 shadow-sm" />
      </div>

      <div class="form-group">
        <label for="celular" class="block text-sm font-semibold text-[#3E261A] mb-1">Teléfono</label>
        <input inputmode="numeric" id="celular" formControlName="celular" type="text"
               class="w-full p-3 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition placeholder-amber-800/40 shadow-sm" />
      </div>
    </div>

    <!-- Botones centrados en la misma fila -->
    <div class="flex justify-center space-x-4 mt-8">
      <button type="submit" [disabled]="customerForm.invalid"
              class="w-full py-3 bg-[#5C3E21] text-white font-bold rounded-lg shadow-lg hover:from-blue-700 hover:to-cyan-600 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-opacity-50 transition-all duration-300 disabled:bg-gray-500">
        Crear Cliente
      </button>

      <button
        class="px-5 py-2.5 bg-[#E6DCD3] hover:bg-[#D8C9B9] text-[#3E261A] font-semibold rounded-lg shadow-md transition-all hover:scale-105"
        type="button"
        (click)="goBack()"
      >
        ⬅ Volver
      </button>
    </div>
  </form>
</div>
