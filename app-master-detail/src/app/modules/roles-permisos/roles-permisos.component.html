<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-3xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Roles con sus Permisos
  </h2>

  <!-- Botón para Crear Rol -->
  <div class="mb-6 text-right">
    <!-- Descomenta si es necesario el botón de crear -->
    <!-- <button
      (click)="createRole()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
      Crear Rol
    </button> -->
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-6 py-4 text-center w-16">ID</th>
          <th class="px-6 py-4 text-left">Rol</th>
          <th class="px-6 py-4 text-left">Permisos</th>
          <th class="px-6 py-4 text-center w-32">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of roles" class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4 text-center font-semibold text-amber-950">{{ rol.iD_Rol }}</td>
          <td class="px-6 py-4 text-left font-medium text-amber-950">{{ rol.nombre_Rol }}</td>
          <td class="px-6 py-4 text-left">
            <span class="inline-flex items-center px-4 py-1.5 bg-gray-100 text-gray-700 border border-gray-300 rounded-full text-xs font-semibold shadow-sm">
              {{ rol.rolPermisos ? rol.rolPermisos.length : 0 }} permisos
            </span>
          </td>
          <td class="px-6 py-4">
            <div class="flex justify-center items-center">
              <a [routerLink]="['/dashboard/roles-permisos/add', rol.iD_Rol]"
                 class="w-10 h-10 bg-[#3E261A] hover:bg-[#5C3E21] text-[#F5EFE4] flex items-center justify-center rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 cursor-pointer"
                 title="Asignar Permisos">
                <i class="pi pi-lock text-base"></i>
              </a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
