<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-3xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Roles
  </h2>

  <!-- Botón para Crear Rol -->
  <div class="mb-6 text-right">
    <button
      (click)="createRole()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
      Crear Rol
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-1 py-1 text-left ">ID</th>
          <th class="px-1 py-1 text-left">Rol</th>
          <th class="px-1 py-1 text-left">Descripción</th>
          <!-- <th class="px-1 py-1 text-left">Permisos</th> -->
          <th class="px-1 py-1 text-left ">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of roles" class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4 text-amber-950">{{ rol.iD_Rol }}</td>
          <td class="px-6 py-4 text-amber-950">{{ rol.nombre_Rol }}</td>
          <td class="px-6 py-4 text-amber-950">{{ rol.descripcion }}</td>
          <!-- <td class="px-6 py-4 text-amber-950">
            <ng-container *ngIf="rol.permisos; else noPermisos">
              <span *ngFor="let permiso of rol.rolPermisos">{{ permiso }}</span>
            </ng-container>
            <ng-template #noPermisos>
              <p class="text-sm text-amber-800/80">No tiene permisos asignados</p>
            </ng-template>
          </td> -->

          <td class="px-6 py-4 flex justify-evenly items-center">
            <!-- Botón de eliminar con gradiente rojo y hover -->
            <button *ngIf="rol.iD_Rol !== undefined" (click)="deleteRol(rol.iD_Rol)"
                    class="px-4 py-2 bg-red-700 hover:bg-red-850 text-white font-semibold rounded-lg shadow-md transition-all">
              Eliminar
            </button>

            <!-- Botón para asignar permisos con gradiente azul -->
            <!-- <button [routerLink]="['/dashboard/roles/rolpermiso', rol.iD_Rol]"
                    class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
              Asignar Permisos
            </button> -->
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
