<div class="p-8 mt-10 bg-white text-amber-950 rounded-2xl shadow-lg border border-amber-100/70 border-t-8 border-t-[#5C3E21] max-w-4xl mx-auto animated fadeIn">
  <h2 class="text-3xl font-extrabold text-[#3E261A] mb-2 flex items-center gap-2">
    <i class="pi pi-box text-[#8E4E2A]"></i> Asignar Stock a Almacén
  </h2>
  <p class="text-amber-800/70 text-sm mb-8">Asigna múltiples productos e insumos con diferentes cantidades de stock a un almacén específico.</p>

  <form [formGroup]="asignarForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <!-- Sección de Selección de Almacén -->
    <div class="bg-[#FAF6EE] p-5 rounded-xl border border-amber-200/50 shadow-inner">
      <label for="AlmacenId" class="block text-xs font-bold text-[#8E4E2A] uppercase tracking-wider mb-2">
        1. Almacén de Destino
      </label>
      <select id="AlmacenId" formControlName="AlmacenId"
        class="w-full p-3 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition shadow-sm font-medium">
        <option [value]="null" disabled selected>Seleccione el almacén de destino...</option>
        <option *ngFor="let almacen of almacenes" [value]="almacen.id">
          🏢 {{ almacen.nombre }} — {{ almacen.locacion }}
        </option>
      </select>
      <div *ngIf="asignarForm.controls['AlmacenId'].invalid && asignarForm.controls['AlmacenId'].touched"
        class="text-red-600 text-xs mt-1 font-semibold">
        El almacén de destino es obligatorio.
      </div>
    </div>

    <!-- Sección de Selección de Items y Stocks -->
    <div class="border border-amber-100 rounded-xl p-5 bg-white shadow-sm space-y-4">
      <div class="flex justify-between items-center mb-2">
        <label class="block text-xs font-bold text-[#8E4E2A] uppercase tracking-wider">
          2. Lista de Items y Cantidades
        </label>
        <button type="button" (click)="agregarFila()"
          class="px-4 py-2 bg-[#8E4E2A] hover:bg-[#7D411F] text-white text-xs font-semibold rounded-lg flex items-center gap-1.5 transition shadow-sm hover:scale-105">
          <i class="pi pi-plus"></i> Agregar Fila
        </button>
      </div>

      <!-- Contenedor del FormArray -->
      <div formArrayName="Items" class="space-y-3">
        <div *ngFor="let itemGroup of itemsFormArray.controls; let i = index" [formGroupName]="i"
          class="flex flex-col md:flex-row items-center gap-3 p-4 bg-[#FAF6EE]/40 hover:bg-[#FAF6EE]/80 border border-amber-100/50 rounded-xl transition duration-150 row-animated">
          
          <span class="flex-none font-bold text-xs text-[#8E4E2A] bg-amber-100/70 w-8 h-8 rounded-full flex items-center justify-center shadow-sm">
            {{ i + 1 }}
          </span>

          <!-- Selector de Item (Producto o Insumo) -->
          <div class="flex-1 w-full">
            <select formControlName="ItemId"
              class="w-full p-2.5 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition shadow-sm text-sm">
              <option [value]="null" disabled selected>Seleccione un item (producto o insumo)...</option>
              <option *ngFor="let item of itemsList" [value]="item.id" [disabled]="isItemSeleccionado(item.id, i)">
                {{ item.nombre }} ({{ item.tipo }}) — {{ item.unidadMedida || 'Unidad' }}
              </option>
            </select>
            <div *ngIf="itemGroup.get('ItemId')?.invalid && itemGroup.get('ItemId')?.touched"
              class="text-red-600 text-xs mt-1">El item es requerido.</div>
          </div>

          <!-- Input de Stock -->
          <div class="w-full md:w-48">
            <div class="relative rounded-lg shadow-sm">
              <input type="number" formControlName="Stock" min="1" placeholder="Stock"
                class="w-full p-2.5 bg-white border border-amber-200 text-[#3E261A] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8E4E2A] transition placeholder-amber-800/30 text-sm" />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <span class="text-amber-800/40 text-xs font-semibold">uds</span>
              </div>
            </div>
            <div *ngIf="itemGroup.get('Stock')?.invalid && itemGroup.get('Stock')?.touched"
              class="text-red-600 text-xs mt-1">Stock mínimo es 1.</div>
          </div>

          <!-- Botón de Eliminar Fila -->
          <button type="button" (click)="eliminarFila(i)"
            class="flex-none p-2.5 text-red-600 hover:text-white hover:bg-red-500 rounded-lg transition duration-200 border border-transparent hover:border-red-600"
            title="Quitar item">
            <i class="pi pi-trash text-base"></i>
          </button>
        </div>
      </div>
      
      <!-- Mensaje si no hay filas cargadas (nunca debería ocurrir debido al OnInit, pero por seguridad) -->
      <div *ngIf="itemsFormArray.length === 0" class="text-center py-6 text-amber-800/50 text-sm">
        Haz clic en "Agregar Fila" para comenzar a asignar.
      </div>
    </div>

    <!-- Acciones Finales -->
    <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-amber-100">
      <button type="submit" [disabled]="asignarForm.invalid"
        class="flex-1 px-6 py-3.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-bold rounded-xl shadow-md transition-all hover:scale-[1.01] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center justify-center gap-2">
        <i class="pi pi-save"></i> Guardar Asignaciones
      </button>
      <button type="button" (click)="goBack()"
        class="px-6 py-3.5 bg-[#E6DCD3] hover:bg-[#D8C9B9] text-[#3E261A] font-bold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
        <i class="pi pi-arrow-left"></i> Volver
      </button>
    </div>
  </form>
</div>
