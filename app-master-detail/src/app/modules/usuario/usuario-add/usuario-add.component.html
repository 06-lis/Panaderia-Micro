<div class="flex items-center justify-center min-h-full pt-10 pb-10 bg-[#FAF6EE] rounded-lg">
  <div class="w-full max-w-md p-6 rounded-2xl bg-white text-amber-950 border border-amber-100/70 shadow-md">
    <h2 class="text-3xl font-extrabold mb-6 text-left text-[#3E261A]">
      Crear Usuario
    </h2>

    <form [formGroup]="userForm" (ngSubmit)="createUser()" class="space-y-6">

      <!-- Nombre -->
      <div class="mb-5">
        <label for="username" class="text-amber-950 font-semibold mb-2 block text-sm">Nombre</label>
        <input
          type="text"
          id="username"
          class="w-full p-3 bg-[#FAF6EE] text-[#3E261A] border border-amber-200 focus:ring-2 focus:ring-[#8E4E2A] focus:outline-none placeholder-amber-800/40 rounded-lg shadow-sm transition-all"
          formControlName="username"
          placeholder="Nombre del usuario"
        />
        <div *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched" class="text-red-400 text-sm mt-1">
          El nombre es requerido (máximo 30 caracteres).
        </div>
      </div>

      <!-- Apellidos -->
      <div class="mb-5">
        <label for="fullname" class="text-amber-950 font-semibold mb-2 block text-sm">Apellidos</label>
        <input
          type="text"
          id="fullname"
          class="w-full p-3 bg-[#FAF6EE] text-[#3E261A] border border-amber-200 focus:ring-2 focus:ring-[#8E4E2A] focus:outline-none placeholder-amber-800/40 rounded-lg shadow-sm transition-all"
          formControlName="fullname"
          placeholder="Apellidos del usuario"
        />
        <div *ngIf="userForm.get('fullname')?.invalid && userForm.get('fullname')?.touched" class="text-red-400 text-sm mt-1">
          El apellido es requerido (máximo 30 caracteres).
        </div>
      </div>

      <!-- Password -->
      <div class="mb-5">
        <label for="password" class="text-amber-950 font-semibold mb-2 block text-sm">Contraseña</label>
        <input
          type="password"
          id="password"
          class="w-full p-3 bg-[#FAF6EE] text-[#3E261A] border border-amber-200 focus:ring-2 focus:ring-[#8E4E2A] focus:outline-none placeholder-amber-800/40 rounded-lg shadow-sm transition-all"
          formControlName="password"
          placeholder="Contraseña"
        />
        <div *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched" class="text-red-400 text-sm mt-1">
          La contraseña es requerida (máximo 30 caracteres).
        </div>
      </div>

      <!-- Empleado (Opcional) -->
      <div class="mb-5">
        <label for="idEmpleado" class="text-amber-950 font-semibold mb-2 block text-sm">Empleado (Opcional)</label>
        <select
          id="idEmpleado"
          class="w-full p-3 bg-[#FAF6EE] text-[#3E261A] border border-amber-200 focus:ring-2 focus:ring-[#8E4E2A] focus:outline-none rounded-lg shadow-sm transition-all"
          formControlName="idEmpleado"
        >
          <option [ngValue]="null">Ninguno (No es un empleado)</option>
          @for (emp of empleados; track emp.idEmpleado) {
            <option [value]="emp.idEmpleado">{{ emp.nombre }} {{ emp.apellido }}</option>
          }
        </select>
      </div>

      <!-- Cliente (Opcional) -->
      <div class="mb-5">
        <label for="idCliente" class="text-amber-950 font-semibold mb-2 block text-sm">Cliente (Opcional)</label>
        <select
          id="idCliente"
          class="w-full p-3 bg-[#FAF6EE] text-[#3E261A] border border-amber-200 focus:ring-2 focus:ring-[#8E4E2A] focus:outline-none rounded-lg shadow-sm transition-all"
          formControlName="idCliente"
        >
          <option [ngValue]="null">Ninguno (No es un cliente)</option>
          @for (cli of clientes; track cli.id || cli.customerId) {
            <option [value]="cli.id || cli.customerId">{{ cli.nombre || cli.firstName }} {{ cli.apellidos || cli.pSurname }}</option>
          }
        </select>
      </div>

      <!-- Botón para Crear Usuario -->
      <button
        type="submit"
        class="w-full py-3 px-6 bg-[#5C3E21] text-white font-semibold rounded-lg shadow-lg transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-opacity-50 transition-all duration-300"
        [disabled]="userForm.invalid"
      >
        Agregar Usuario
      </button>
      <!-- Botón Volver -->
      <button
      class="w-full py-2 px-4 bg-[#E6DCD3] hover:bg-[#D8C9B9] text-[#3E261A] font-bold rounded-lg shadow-md transition-all"
      type="button"
      (click)="goBack()"
    >
      ⬅ Volver
    </button>
    </form>
  </div>
</div>
