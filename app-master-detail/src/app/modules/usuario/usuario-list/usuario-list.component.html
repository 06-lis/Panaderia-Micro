<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-3xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Usuarios
  </h2>

  <!-- Botón para Crear Usuario -->
  <div class="mb-6 text-right">
    <button
      (click)="createUser()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
      Crear Usuario
    </button>
  </div>

  <!-- Contenedor con scroll -->
  <div class="overflow-auto max-h-96">
    <table class="w-full table-auto text-sm text-center bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-4 py-2 text-left">ID</th>
          <th class="px-4 py-2 text-left">Nombre</th>
          <th class="px-4 py-2 text-left">Nombre Usuario</th>
          <th class="px-4 py-2 text-left">Relación</th>
          <th class="px-4 py-2 text-left">Roles</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4 text-left text-amber-950">{{ user.userId }}</td>
          <td class="px-6 py-4 text-left text-amber-950">{{ user.fullname }}</td>
          <td class="px-6 py-4 text-left text-amber-950">{{ user.username }}</td>
          <td class="px-6 py-4 text-left text-amber-950">
            <span *ngIf="user.idEmpleado" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold">
              Empleado #{{ user.idEmpleado }}
            </span>
            <span *ngIf="user.idCliente" class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-semibold">
              Cliente #{{ user.idCliente }}
            </span>
            <span *ngIf="!user.idEmpleado && !user.idCliente" class="text-amber-800/80">-</span>
          </td>
          <td class="px-6 py-4 text-left text-amber-950">
            <div class="flex flex-wrap gap-2 justify-start">
              <ng-container *ngIf="user.roles && user.roles.length > 0; else noPermisos">
                <span *ngFor="let roles of user.roles" class="px-3 py-1 bg-[#8E4E2A]/15 text-[#5C3E21] border border-[#8E4E2A]/30 rounded-full text-xs font-semibold">
                  {{ roles.nombre_Rol }}
                </span>
              </ng-container>
              <ng-template #noPermisos>
                <span class="text-amber-800/80">No tiene roles asignados</span>
              </ng-template>
            </div>
          </td>
          <!-- <td class="px-6 py-4 flex justify-evenly items-center"> -->
            <!-- Aquí irían las acciones si las tienes -->
          <!-- </td> -->
        </tr>
      </tbody>
    </table>
  </div>
</div>
