<!-- Tabla Mejorada -->
<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-3xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Productos
  </h2>

  <!-- Botón para crear un nuevo almacén -->
  <div class="flex justify-end mb-4">
    <button (click)="agregarProducto()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
      ➕ Crear Producto
    </button>
  </div>

  <div *ngIf="message" class="mt-3 mb-2 p-4 bg-[#FAF6EE] border-l-4 border-[#8E4E2A] text-[#5C3E21] rounded-lg flex items-center justify-between">
    <span>{{ message }}</span>
    <button (click)="message = ''" class="text-[#8E4E2A] hover:text-[#5C3E21] font-bold">
      &times;
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-5 py-3 text-left">ID</th>
          <th class="px-5 py-3 text-left">Producto</th>
          <th class="px-5 py-3 text-left">Precio</th>
          <th class="px-5 py-3 text-left">Categoria</th>
          <th class="px-5 py-3 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let producto of products"
          class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4">{{ producto.id }}</td>
          <td class="px-6 py-4 font-semibold text-[#8E4E2A]">{{ producto.nombre }}</td>
          <td class="px-6 py-4 font-bold">{{ producto.precio }} Bs</td>
          <td class="px-6 py-4">{{ producto.categoria?.nombre }}</td>
          <td class="px-6 py-4">
            <button (click)="deleteProduct(producto.id!)"
              class="px-4 py-2 bg-red-700 hover:bg-red-800 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
