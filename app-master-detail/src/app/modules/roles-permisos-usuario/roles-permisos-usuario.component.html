<div class="p-6 mt-10 bg-white text-amber-950 rounded-2xl shadow-md border border-amber-100/70 border-t-4 border-t-[#5C3E21]">
  <h2 class="text-3xl font-extrabold mb-8 text-left text-[#3E261A]">
    Lista de Usuarios con sus Roles
  </h2>

  <!-- Botón para Crear Rol -->
  <div class="mb-6 text-right">
    <!-- Descomenta si es necesario el botón de crear -->
    <!-- <button
      (click)="createRole()"
      class="px-5 py-2.5 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all hover:scale-105">
      Crear Rol
    </button> -->
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-white rounded-xl border-collapse border border-amber-100/60">
      <thead>
        <tr class="bg-[#5C3E21] text-white border-b border-[#3E261A]">
          <th class="px-4 py-2 text-left ">ID</th>
          <th class="px-4 py-2 text-left">Nombre</th>
          <th class="px-4 py-2 text-left">Roles</th>
          <th class="px-4 py-2 text-left ">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="hover:bg-[#FAF6EE] transition-colors duration-200 border-b border-amber-100/50">
          <td class="px-6 py-4 text-amber-950">{{ user.userId }}</td>
          <td class="px-6 py-4 text-amber-950"> {{ user.fullname }}  </td>
          <td class="px-6 py-4 text-amber-950">
            <div class="flex flex-wrap gap-2 justify-start">
              <ng-container *ngIf="user.roles && user.roles.length > 0; else noPermisos">
                <span *ngFor="let rol of user.roles" class="px-3 py-1 bg-[#8E4E2A]/15 text-[#5C3E21] border border-[#8E4E2A]/30 rounded-full text-xs font-semibold">
                  {{ rol.nombre_Rol }}
                </span>
              </ng-container>
              <ng-template #noPermisos>
                <span class="text-amber-800/80">No tiene roles asignados</span>
              </ng-template>
            </div>
          </td>
          <td class="px-6 py-4 flex justify-evenly items-center">
            <a [routerLink]="['/dashboard/roles-permisos-usuario/add', user.userId]"
              class="px-4 py-2 bg-[#8E4E2A] hover:bg-[#7D411F] text-white font-semibold rounded-lg shadow-md transition-all">
              Asignar Roles
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
