<div class="sidebar">
  @for (section of sections; track section.name) {
    <!-- Section Header (clickable) -->
    <button class="section-header" (click)="toggleSection(section.name)" [class.collapsed]="isSectionCollapsed(section.name)">
      <span class="section-title">{{ section.name }}</span>
      <i class="pi pi-chevron-down section-chevron" [class.rotated]="isSectionCollapsed(section.name)"></i>
    </button>

    <!-- Section Items (collapsible) -->
    <div class="section-items" [class.collapsed]="isSectionCollapsed(section.name)">
      @for (route of section.routes; track route.path) {
        @if (hasPermission(route.data?.permission)) {
          <a [routerLink]="route.path"
             routerLinkActive="active">
            <i class="{{ route.data?.icon }}"></i>
            <span>{{ route.data?.title }}</span>
          </a>
        }
      }
    </div>
  }
</div>
